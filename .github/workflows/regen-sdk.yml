name: Regen SDK

# Disparado por turtle-partners cuando hace push a main con cambios en handlers v2.
# Descarga el openapi.v2.json actualizado, regenera el cliente, clasifica el diff
# con oasdiff, bumpea version segun severidad y abre PR. Auto-merge si es
# non-breaking; breaking requiere review humana.
on:
  repository_dispatch:
    types: [openapi-v2-updated]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref de turtle-partners a leer (default: main)"
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Determine partners ref
        id: partners-ref
        run: |
          REF="${{ github.event.client_payload.ref || inputs.ref || 'main' }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Download openapi.v2.json from turtle-partners
        env:
          GH_TOKEN: ${{ secrets.PARTNERS_READ_TOKEN }}
        run: |
          gh api \
            repos/turtle-dao/turtle-partners/contents/openapi.v2.json \
            --jq '.content' \
            -H "Accept: application/vnd.github.v3+json" \
            --field ref=${{ steps.partners-ref.outputs.ref }} \
            | base64 -d > openapi.v2.json.new

      - name: Diff specs with oasdiff
        id: oasdiff
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/specs" \
            tufin/oasdiff:latest \
            breaking /specs/openapi.v2.json /specs/openapi.v2.json.new \
            --fail-on ERR
          BREAKING_EXIT=$?
          set -e

          set +e
          docker run --rm \
            -v "$PWD:/specs" \
            tufin/oasdiff:latest \
            diff /specs/openapi.v2.json /specs/openapi.v2.json.new \
            --exclude-elements description,summary,title,examples
          STRUCT_EXIT=$?
          set -e

          if [ "$BREAKING_EXIT" -ne 0 ]; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "label=needs-review" >> "$GITHUB_OUTPUT"
          elif [ "$STRUCT_EXIT" -ne 0 ]; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "label=auto-merge" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "label=auto-merge" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace spec
        run: mv openapi.v2.json.new openapi.v2.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate SDK
        run: bun run codegen

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Bump SDK version
        id: bump
        run: |
          cd packages/sdk
          NEW_VERSION=$(npm version --no-git-tag-version ${{ steps.oasdiff.outputs.bump }})
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: regen-sdk/${{ steps.bump.outputs.version }}
          delete-branch: true
          commit-message: |
            chore(sdk): regen from openapi.v2.json (${{ steps.oasdiff.outputs.bump }} bump → ${{ steps.bump.outputs.version }})
          title: "chore(sdk): regen ${{ steps.bump.outputs.version }} (${{ steps.oasdiff.outputs.bump }})"
          body: |
            Auto-regenerado desde `turtle-partners@${{ steps.partners-ref.outputs.ref }}`.

            **Clasificacion:** `${{ steps.oasdiff.outputs.bump }}`
            **Version nueva:** `${{ steps.bump.outputs.version }}`

            ${{ steps.oasdiff.outputs.bump == 'major' && '⚠️ **Breaking change detectado.** Requiere review humana antes de mergear.' || '✅ Non-breaking — auto-mergeable.' }}
          labels: ${{ steps.oasdiff.outputs.label }}

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number && steps.oasdiff.outputs.label == 'auto-merge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ steps.pr.outputs.pull-request-number }}
