name: Publish SDK

# Despues de mergear a main, publica @turtleclub/sdk a npm si la version
# del package.json todavia no esta publicada. Es idempotente: si la version
# ya existe en npm, no hace nada.
on:
  push:
    branches: [main]
    paths:
      - packages/sdk/**
      - openapi.v2.json
      - bun.lock
      - .github/workflows/publish.yml

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check if version already published
        id: check
        working-directory: packages/sdk
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @turtleclub/sdk@$VERSION version > /dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION ya publicada — skip"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION nueva — publish"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create git tag
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git config user.name "turtle-bot"
          git config user.email "turtle-bot@turtle.xyz"
          git tag "@turtleclub/sdk@${{ steps.check.outputs.version }}"
          git push origin "@turtleclub/sdk@${{ steps.check.outputs.version }}"
